<!-- 기존 <header> 안의 upload-section과 loading-container를 삭제하거나 주석 처리하세요 -->
<header class="glass-panel text-center">
    <h1 class="gradient-text">나의 E-Book 사이트</h1>
    <p class="subtitle">작품을 감상해 보세요.</p>
</header>

<!-- 메인 영역을 처음부터 보이게 수정 (style="display: block;") -->
<main id="book-area" style="display: block;">
    <div class="book-controls glass-panel">
        <button id="prev-btn" class="control-btn">이전</button>
        <span id="page-info">로딩 중...</span>
        <button id="next-btn" class="control-btn">다음</button>
    </div>
    <div class="book-wrapper">
        <div id="book"></div>
    </div>
</main>
